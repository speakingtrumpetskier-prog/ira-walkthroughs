# Render blueprint for the live walkthroughs.
# Set ANTHROPIC_API_KEY manually in each service's Environment tab in the
# Render dashboard (sync: false below means Render won't sync it from the file).
services:
  - type: web
    name: convergent-v3
    runtime: node
    rootDir: v3-live
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_VERSION
        value: 20
      - key: MODEL
        value: claude-opus-4-7
      - key: EFFORT
        value: low
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: convergent-v4
    runtime: node
    rootDir: v4-engine
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: 20
      - key: MODEL
        value: claude-opus-4-7
      - key: EFFORT
        value: low
      - key: ANTHROPIC_API_KEY
        sync: false
